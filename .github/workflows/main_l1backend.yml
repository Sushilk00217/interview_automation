name: Build and deploy Mock Backend to Azure Web App - L1Backend

on:
  push:
    branches:
      - main
    paths:
      - "mock_backend/**"
      - ".github/workflows/backend-appservice.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - show repo root files
        run: |
          pwd
          ls -lah
          echo "---- mock_backend folder ----"
          ls -lah mock_backend || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (mock_backend)
        run: |
          python -m pip install --upgrade pip
          pip install -r mock_backend/requirements.txt

      - name: Create deployment package (zip mock_backend only)
        run: |
          cd mock_backend
          zip -r ../mock_backend.zip . -x "*.git*" "*__pycache__*" "*.pytest_cache*"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: mock-backend-package
          path: mock_backend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mock-backend-package

      - name: Debug - show downloaded files
        run: |
          pwd
          ls -lah

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "L1Backend"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2E8227CF876F4093AE4435206BC4458E }}
          package: mock_backend.zip
